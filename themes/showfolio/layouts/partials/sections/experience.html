<div class="flex flex-col md:flex-row gap-4 md:gap-8">
  <div class="md:w-1/3">
    <div class="flex flex-col items-start">
      <div class="flex items-center gap-2">
        {{ partial "responsive-image.html" (dict "image" .Params.logo "alt" (print .Params.company " logo") "class" "w-8 h-8 object-contain") }}
        <h3 class="text-xl font-bold">{{ .Params.company }}</h3>
      </div>
      <p class="text-gray-600 dark:text-gray-400">{{ .Params.location }}</p>
      <p class="text-gray-600 dark:text-gray-400">{{ .Params.duration }}</p>
    </div>
  </div>
  <div class="md:w-2/3">
    <div class="flex flex-col items-start">
      <h4 class="text-lg font-semibold">{{ .Params.position }}</h4>
      <div class="prose dark:prose-invert max-w-none">
        {{ .Content }}
      </div>
    </div>
  </div>
</div>
