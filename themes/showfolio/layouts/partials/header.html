<header class="w-full px-4 pt-4 max-w-5xl mx-auto">
  <nav class="flex items-center justify-between flex-wrap space-y-3">
    <div class="flex gap-2 items-center">
      {{ with . }}
      <a href="{{ .Site.Home.Permalink }}" aria-label="EMail" style="margin-top: 2.2px">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <circle cx="12" cy="12" r="4" />
          <path d="M16 12v1.5a2.5 2.5 0 0 0 5 0v-1.5a9 9 0 1 0 -5.5 8.28" />
        </svg>
      </a>
      {{end}}
      <a href="{{ .Site.Home.Permalink }}" class="flex items-center font-bold">
        {{ .Site.Title }}
      </a>
    </div>

    <div class="flex items-center space-x-8">
      <ul id="nav-menu" class="flex space-x-8">
        {{ with .Site.GetPage "/about" }}
        <li>
          <a href="{{ .Permalink }}" class="hover:text-blue-800 dark:hover:text-blue-300">{{ .Title }}</a>
        </li>
        {{ end }}
        {{ with .Site.GetPage "/experience" }}
        <li>
          <a href="{{ .Permalink }}" class="hover:text-blue-800 dark:hover:text-blue-300">{{ .Title }}</a>
        </li>
        {{ end }}
        {{ with .Site.GetPage "/film-photography" }}
        <li>
          <a href="{{ .Permalink }}" class="hover:text-blue-800 dark:hover:text-blue-300">{{ .Title }}</a>
        </li>
        {{ end }}
      </ul>

      <button 
        onclick="toggleTheme()"
        class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-200"
        aria-label="Toggle Dark Mode"
      >
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          class="h-5 w-5 hidden dark:block" 
          fill="none" 
          viewBox="0 0 24 24" 
          stroke="currentColor"
        >
          <!-- Sun icon -->
          <path 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            stroke-width="2" 
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" 
          />
        </svg>
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          class="h-5 w-5 block dark:hidden" 
          fill="none" 
          viewBox="0 0 24 24" 
          stroke="currentColor"
        >
          <!-- Moon icon -->
          <path 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            stroke-width="2" 
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" 
          />
        </svg>
      </button>
    </div>
  </nav>
</header>
