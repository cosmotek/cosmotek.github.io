{{ define "main" }}
<div class="space-y-8">
    <h1 class="text-3xl font-bold">Gallery</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {{ range .Resources.ByType "image" }}
        <div class="relative group">
            {{ partial "responsive-image.html" (dict "image" . "alt" .Title "class" "w-full h-64 object-cover rounded-lg") }}
            <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-50 transition-opacity duration-300 rounded-lg flex items-center justify-center">
                <p class="text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300">{{ .Title }}</p>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
